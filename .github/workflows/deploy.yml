name: Build and Deploy to ConoHa WING

# ビルド後、まずSSH(rsync)で out/ を配信。SSH障害中(例: CVE-2026-43499対応の一時停止)で失敗したら
# 同じ out/ をFTPSで自動フォールバック配信する。SSH復旧後はSSHが成功しFTPは自動でスキップ。
on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 第1経路: SSH(rsync)。障害中は失敗するが continue-on-error でジョブは止めない。
      - name: Attempt SSH deploy
        id: ssh
        continue-on-error: true
        env:
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          PORT=$(echo "${REMOTE_PORT}" | tr -d '[:space:]')
          DEST=$(echo "${REMOTE_PATH}" | tr -d '[:space:]')
          REMOTE="${REMOTE_USER}@${REMOTE_HOST}"
          ssh -p "${PORT}" "${REMOTE}" "mkdir -p ${DEST}"
          rsync -az -e "ssh -p ${PORT}" ./out/ "${REMOTE}:${DEST}/"

      # 第2経路: SSHが失敗したときのみFTPSで自動フォールバック。
      - name: Install lftp (FTPS fallback)
        if: steps.ssh.outcome == 'failure'
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: FTPS fallback deploy
        if: steps.ssh.outcome == 'failure'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          echo "SSHデプロイ失敗を検知 → FTPSでフォールバック配信します"
          DEST=$(echo "${FTP_SERVER_DIR}" | tr -d '[:space:]')
          # 明示的FTPS。SSH版 rsync(-az・削除なし)と挙動を揃える。
          lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" "${FTP_SERVER}" -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; mirror -R --verbose -X '.DS_Store' ./out/ '${DEST}'; bye"
